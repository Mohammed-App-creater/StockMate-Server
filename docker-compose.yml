services:
  db:
    image: postgres:17-alpine
    container_name: stockmate_db
    environment:
      POSTGRES_USER: stockmate
      POSTGRES_PASSWORD: stockmate123
      POSTGRES_DB: stockmate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    container_name: stockmate_api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  postgres_data: